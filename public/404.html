<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Cardly</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,700;12..96,800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'Bricolage Grotesque', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px;
      height: 26px;
      position: relative;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 800;
      color: #f5f5f5;
      letter-spacing: -0.5px;
    }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #ff4d00;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1.1;
      margin-bottom: 16px;
      padding: 0 8px;
      background: linear-gradient(135deg, #f5f5f5 0%, #666 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 16px;
      color: #888;
      font-weight: 300;
      margin-bottom: 40px;
      max-width: 340px;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ff4d00;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      transition: opacity 0.15s;
    }
    a.btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <svg class="logo-icon" viewBox="0 0 52 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="10" width="42" height="28" rx="7" fill="#7a2500"/>
      <rect x="5" y="5" width="42" height="28" rx="7" fill="#b83a00"/>
      <rect x="0" y="0" width="42" height="28" rx="7" fill="#ff4d00"/>
      <line x1="9" y1="9" x2="33" y2="9" stroke="rgba(255,255,255,0.38)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="9" y1="17" x2="33" y2="17" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="9" y1="24" x2="22" y2="24" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">Cardly</span>
  </a>

  <div class="code">Error 404</div>
  <h1>Lost?</h1>
  <p>This page doesn't exist. The deck you're looking for might have been moved or deleted.</p>
  <a href="/" class="btn">Back to Cardly</a>
</body>
</html>
